# Host-Ollama setup (recommended on macOS):
#   Ollama runs natively on the host (fast, uses the GPU);
#   only the auditor runs in this container and reaches Ollama
#   at host.docker.internal:11434.
services:
  auditor:
    build: .
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5-coder:7b
    ports:
      - "8501:8501"
    extra_hosts:
      # Makes host.docker.internal resolve on Linux too (works on Mac by default).
      - "host.docker.internal:host-gateway"
    volumes:
      # Repos you want to audit go in ./repos and are seen at /app/repos.
      - ./repos:/app/repos
      # Optional: persist the SQLite db / reports outside the container.
      - ./data:/app/data